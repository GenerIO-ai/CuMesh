name: Build & Release Wheels (CUDA)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  TORCH_VERSION: "2.5.1"
  PYTORCH_INDEX_URL: "https://download.pytorch.org/whl/cu124"
  CUDA_IMAGE: "nvidia/cuda:12.4.1-devel-ubuntu22.04"

jobs:
  build-wheels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build wheels (cp310 + cp311) inside CUDA container
        env:
          CUMESH_COMMIT: c4ad6125924fcedfd13f0bd61520ca2d24eb7a87
          CUBVH_COMMIT: ce92267a24ef6ad7d2c8ccbc2ae2c021a6597e70
        run: |
          set -euo pipefail
          mkdir -p dist

          docker run --rm \
            -v "${PWD}:/src" -w /src \
            -e TORCH_CUDA_ARCH_LIST="8.0;8.6;8.9;9.0+PTX" \
            -e CUDA_HOME=/usr/local/cuda \
            -e CUMESH_COMMIT="${CUMESH_COMMIT}" \
            -e CUBVH_COMMIT="${CUBVH_COMMIT}" \
            -e TORCH_VERSION="${TORCH_VERSION}" \
            -e PYTORCH_INDEX_URL="${PYTORCH_INDEX_URL}" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e TZ=Etc/UTC \
            "${CUDA_IMAGE}" \
              bash -lc '
                set -euo pipefail

                export DEBIAN_FRONTEND=noninteractive
                export TZ=Etc/UTC

                apt-get update
                apt-get install -y --no-install-recommends \
                  ca-certificates curl \
                  software-properties-common \
                  git build-essential ninja-build cmake

                # Install Python 3.10 (default) + Python 3.11
                add-apt-repository -y ppa:deadsnakes/ppa
                apt-get update

                # Key change: install distutils + pip packages from apt (no ensurepip)
                apt-get install -y --no-install-recommends \
                  python3.10 python3.10-dev python3.10-venv python3.10-distutils \
                  python3.11 python3.11-dev python3.11-venv python3.11-distutils \
                  python3-pip

                git config --global --add safe.directory "*"

                # Ensure correct commits
                git fetch --all --tags
                git checkout "$CUMESH_COMMIT"
                git submodule update --init --recursive

                cd third_party/cubvh
                git fetch --all --tags
                git checkout "$CUBVH_COMMIT"
                cd /src

                build_one () {
                  PYBIN="$1"
                  VENV_DIR=".venv-${PYBIN}"

                  rm -rf build/ .eggs/ *.egg-info || true
                  rm -rf "$VENV_DIR" || true

                  # Create an isolated venv; pip will be present (backed by apt pip)
                  "$PYBIN" -m venv "$VENV_DIR"
                  . "$VENV_DIR/bin/activate"

                  python -m pip --version
                  python -m pip install -U pip setuptools wheel build

                  # Match the runtime torch ABI exactly.
                  python -m pip install "torch==${TORCH_VERSION}" --index-url "${PYTORCH_INDEX_URL}"
                  python -c "import torch; print(torch.__version__); print(torch.version.cuda)"

                  # Build wheel
                  python -m pip wheel . -w /src/dist --no-build-isolation --no-deps -v

                  deactivate
                }

                build_one python3.10
                build_one python3.11

                ls -lah dist
              '

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cumesh*.whl
          generate_release_notes: true
