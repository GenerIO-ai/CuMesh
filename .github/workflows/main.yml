name: Build & Release Wheels (CUDA)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-wheels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build wheels (cp310 + cp311) inside CUDA container
        env:
          CUMESH_COMMIT: c4ad6125924fcedfd13f0bd61520ca2d24eb7a87
          CUBVH_COMMIT: ce92267a24ef6ad7d2c8ccbc2ae2c021a6597e70
        run: |
          set -euo pipefail
          mkdir -p dist

          docker run --rm \
            -v "${PWD}:/src" -w /src \
            -e TORCH_CUDA_ARCH_LIST="8.0;8.6;8.9;9.0+PTX" \
            -e CUDA_HOME=/usr/local/cuda \
            -e CUMESH_COMMIT="${CUMESH_COMMIT}" \
            -e CUBVH_COMMIT="${CUBVH_COMMIT}" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e TZ=Etc/UTC \
            nvidia/cuda:12.4.1-devel-ubuntu22.04 \
              bash -lc '
                set -euo pipefail

                export DEBIAN_FRONTEND=noninteractive
                export TZ=Etc/UTC

                apt-get update
                apt-get install -y --no-install-recommends \
                  ca-certificates curl \
                  software-properties-common \
                  git build-essential ninja-build cmake

                # Install Python 3.10 (default) + Python 3.11
                add-apt-repository -y ppa:deadsnakes/ppa
                apt-get update
                apt-get install -y --no-install-recommends \
                  python3.10 python3.10-dev python3.10-venv \
                  python3.11 python3.11-dev python3.11-venv

                git config --global --add safe.directory "*"

                # Ensure correct commits
                git fetch --all --tags
                git checkout "$CUMESH_COMMIT"
                git submodule update --init --recursive

                cd third_party/cubvh
                git fetch --all --tags
                git checkout "$CUBVH_COMMIT"
                cd /src

                build_one () {
                  PYBIN="$1"

                  rm -rf build/ .eggs/ *.egg-info || true

                  "$PYBIN" -m ensurepip --upgrade || true
                  "$PYBIN" -m pip install -U pip setuptools wheel build

                  # Match your runtime torch (cu124)
                  "$PYBIN" -m pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cu124

                  # Build wheel
                  "$PYBIN" -m pip wheel . -w dist --no-build-isolation --no-deps -v
                }

                build_one python3.10
                build_one python3.11

                ls -lah dist
              '

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cumesh*.whl
          generate_release_notes: true